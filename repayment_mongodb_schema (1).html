
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; height: auto; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a5f' : '#e6f1fb',
    primaryTextColor: dark ? '#b5d4f4' : '#0c447c',
    primaryBorderColor: dark ? '#378add' : '#185fa5',
    secondaryColor: dark ? '#2c1f45' : '#eeedfe',
    tertiaryColor: dark ? '#1a3030' : '#e1f5ee',
    edgeLabelBackground: dark ? '#1a1a18' : '#ffffff',
  },
});
const diagramSrc = `erDiagram
  USER {
    ObjectId _id PK
    string firstName
    string lastName
    string email
    string passwordHash
    string phone
    string role
    string status
    date createdAt
    date updatedAt
    ObjectId createdBy FK
  }
  ADMIN {
    ObjectId _id PK
    ObjectId userId FK
    string department
    string[] permissions
    date lastLogin
  }
  CASE {
    ObjectId _id PK
    ObjectId clientId FK
    ObjectId assignedAdminId FK
    string caseNumber
    string scamType
    string status
    number amountLost
    string currency
    string description
    string[] evidence
    object actionPlan
    date submittedAt
    date updatedAt
    date resolvedAt
  }
  SERVICE_PACKAGE {
    ObjectId _id PK
    string name
    string slug
    number price
    number pricePerTx
    string[] features
    boolean isActive
  }
  ORDER {
    ObjectId _id PK
    ObjectId clientId FK
    ObjectId caseId FK
    ObjectId packageId FK
    string status
    number amount
    string currency
    string paymentMethod
    string paymentRef
    date paidAt
    date createdAt
  }
  CONSULTATION {
    ObjectId _id PK
    ObjectId clientId FK
    ObjectId caseId FK
    ObjectId handledBy FK
    string firstName
    string lastName
    string email
    string phone
    string scamType
    number amountLost
    string message
    string status
    string notes
    date scheduledAt
    date createdAt
  }
  TESTIMONIAL {
    ObjectId _id PK
    ObjectId clientId FK
    string authorName
    string country
    string scamType
    number rating
    string content
    string videoUrl
    boolean approved
    date createdAt
  }
  BLOG_POST {
    ObjectId _id PK
    ObjectId authorId FK
    string title
    string slug
    string content
    string[] tags
    string status
    date publishedAt
    date createdAt
  }
  CASE_NOTE {
    ObjectId _id PK
    ObjectId caseId FK
    ObjectId adminId FK
    string content
    boolean isInternal
    date createdAt
  }
  NOTIFICATION {
    ObjectId _id PK
    ObjectId userId FK
    string type
    string title
    string message
    boolean read
    ObjectId refId
    string refModel
    date createdAt
  }

  USER ||--o| ADMIN : "has role"
  USER ||--o{ CASE : "submits"
  USER ||--o{ ORDER : "places"
  USER ||--o{ CONSULTATION : "requests"
  USER ||--o{ TESTIMONIAL : "writes"
  USER ||--o{ NOTIFICATION : "receives"
  ADMIN ||--o{ CASE : "manages"
  ADMIN ||--o{ CONSULTATION : "handles"
  ADMIN ||--o{ BLOG_POST : "authors"
  CASE ||--o{ ORDER : "fulfilled by"
  CASE ||--o{ CASE_NOTE : "has"
  CASE ||--o{ CONSULTATION : "linked to"
  SERVICE_PACKAGE ||--o{ ORDER : "ordered as"
`;
const { svg } = await mermaid.render('erd-svg', diagramSrc);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
